name: CI

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies and build
        run: |
          ./setup.sh

      - name: Run main tests
        run: |
          cd src
          ./testrun.sh

      - name: Run calendar util tests
        run: |
          cd utils/calendar
          ./testrun.sh

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-html-report
          path: src/tests/report.html

      - name: Upload calendar test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: calendar-test-report
          path: utils/calendar/report.html
